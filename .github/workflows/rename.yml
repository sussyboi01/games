name: Rename Files and Generate zones.json

on:
  workflow_dispatch:   # Manual run from GitHub
  push:
    branches:
      - main

jobs:
  rename:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename files and create zones.json
        run: |
          python3 << 'EOF'
          import os
          import json

          folder = "."
          files = [
              f for f in os.listdir(folder)
              if os.path.isfile(f)
              and not f.startswith(".")
              and f != "zones.json"
          ]

          files.sort()
          zones = []

          for i, filename in enumerate(files[:100], start=1):
              name, ext = os.path.splitext(filename)
              new_name = f"{i}{ext}"

              os.rename(filename, new_name)

              zones.append({
                  "id": i,
                  "name": filename
              })

          with open("zones.json", "w") as f:
              json.dump(zones, f, indent=2)

          print("Done.")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto rename files and generate zones.json" || echo "No changes"
          git push
